name: Pull Requests

on:
  pull_request:
    branches: [main]

jobs:
  build-go:
    name: Build go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        images:
          - localRegistry: localhost:5000/ketch-com/go-ketch-forwarder
            registry: ghcr.io/ketch-com/go-ketch-forwarder
            dockerfile: docker/ketch-event-forwarder/Dockerfile
      fail-fast: false
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Setup .netrc
        uses: conventional-actions/setup-netrc@4f85df605083085682fc078d17b5d15e439a924e # v1
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: network=host
      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.repository_owner }}
      #     password: ${{ env.GITHUB_TOKEN }}
      - name: Build docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        id: dockerbuild
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ${{ matrix.images.dockerfile }}
          tags: ${{ matrix.images.localRegistry }}:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secret-files: |
            "netrc=/home/runner/.netrc"
      # - name: Run Snyk for linux/amd64
      #   uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # master
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_AUTH_TOKEN }}
      #   with:
      #     image: ${{ matrix.images.localRegistry }}:latest
      #     args: --file=${{ env.DOCKERFILE }} --severity-threshold=high --platform=linux/amd64
      # - name: Run Snyk for linux/arm64
      #   uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # master
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_AUTH_TOKEN }}
      #   with:
      #     image: ${{ matrix.images.localRegistry }}:latest
      #     args: --file=${{ env.DOCKERFILE }} --severity-threshold=high --platform=linux/arm64

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
